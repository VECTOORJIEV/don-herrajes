<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicidad Don Herrajes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* DISEÑO EXCLUSIVO PARA CAPTURA DE PANTALLA EN CELULAR */
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: #121214; color: white; text-align: center; padding: 20px; width: 100%; max-width: 450px; margin: auto; }
        
        .publicidad-container { border: 3px solid #f97316; border-radius: 15px; padding: 25px 15px; background: linear-gradient(135deg, #111827, #1f2937); }
        
        /* TU LOGO OFICIAL */
        .logo { width: 150px; height: auto; margin-bottom: 10px; }
        
        .tag { background: #f97316; color: white; display: inline-block; padding: 5px 15px; font-weight: bold; border-radius: 50px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 15px; color: #fff; line-height: 1.2; }
        h1 span { color: #f97316; }
        
        /* LA FOTO DEL CARRITO QUE SUBISTE */
        .foto-producto { width: 100%; max-width: 280px; height: auto; border-radius: 10px; margin: 10px auto 20px auto; display: block; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        
        .caracteristicas { text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #f97316; }
        .caracteristicas p { margin-bottom: 8px; font-size: 0.95rem; display: flex; align-items: center; }
        
        .contacto-box { background: #f97316; color: white; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; margin-top: 15px; }
        .direccion { font-size: 0.75rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="publicidad-container">
    <!-- Tu logotipo integrado automáticamente -->
    <img src="6792_2.png" alt="Don Herrajes" class="logo">
    
    <br>
    <span class="tag">¡Nuevo Ingreso!</span>
    
    <h1>Carrito Vagón <span>Plegable</span></h1>
    
    <!-- Aquí se mostrará la foto del carrito (puedes usar la 8401.jpg que nos enviaste) -->
    <img src="8401.jpg" alt="Carrito Vagón Plegable" class="foto-producto">
    
    <div class="caracteristicas">
        <p>💪 <strong>Soporta hasta 100 kg de peso.</strong></p>
        <p>🛠️ <strong>Estructura de acero ultra resistente.</strong></p>
        <p>📦 <strong>Plegable en segundos (fácil de guardar).</strong></p>
        <p>🏕️ <strong>Ideal para el hogar, súper o camping.</strong></p>
    </div>
    
    <div class="contacto-box">
        📲 Cotiza por WhatsApp: 55 5815 5618
    </div>
    
    <p class="direccion">📍 Héctor Victoria 270, Col. Granjas Navidad, CDMX</p>
</div>

</body>
</html>
